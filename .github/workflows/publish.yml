name: Publish

# Publish to npm and create a GitHub Release when a version tag is pushed,
# e.g. `v1.0.1` or `1.0.1`.
on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]+.[0-9]+.[0-9]+'

# Trusted Publishing (OIDC): no long-lived npm token is stored anywhere.
# GitHub mints a short-lived, workflow-scoped credential at publish time.
# Requires a one-time "Trusted Publisher" setup on npmjs.com pointing at
# this repo + this workflow filename (publish.yml). See README "Releasing".
permissions:
  contents: write # required to create the GitHub Release
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest # trusted publishing requires a cloud-hosted runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # >= 22.14.0 required for trusted publishing
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Ensure npm >= 11.5.1 (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "Tag version: $TAG"
          echo "package.json version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: CLI end-to-end tests
        run: npm run test:cli

      - name: Build tarball
        run: npm pack

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section for this version out of CHANGELOG.md (between this
          # version's heading and the next "## " heading). Falls back to a
          # generic note if the section is missing.
          NOTES="$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[?" ver "\\]?" {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md)"
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="Release $VERSION. See CHANGELOG.md for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if version already on npm
        id: published
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "kiro-wakatime@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::kiro-wakatime@${VERSION} already on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # No NODE_AUTH_TOKEN: the npm CLI auto-detects the OIDC environment and
      # exchanges it for a short-lived publish token. Provenance is generated
      # automatically when publishing via trusted publishing.
      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: '*.tgz'
          fail_on_unmatched_files: true
